repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/pwc-pdm/pre-commit-clang-format
    rev: v1.1.0
    hooks:
      - id: clang-format
        args: [-i]
