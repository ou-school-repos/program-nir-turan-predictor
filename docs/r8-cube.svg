<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 365" font-family="monospace" font-size="11">
  <title>R=8 minimum-cut subgraph — a 3-cube Q(3) in A(16,8)</title>
  <!-- Background -->
  <rect width="720" height="365" fill="white"/>

  <!-- Title -->
  <text x="360" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">R=8 minimum-cut subgraph V' in A(16,8)</text>
  <text x="360" y="38" text-anchor="middle" font-size="10" fill="#666">8 vertices, 12 internal edges (A000788=12, Cheng=11) | |N(V')| = 404 (Cheng predicts 409)</text>

  <!-- Edges (drawn first, behind nodes) -->
  <g stroke="#888" stroke-width="1.5" fill="none">
    <!-- Front face -->
    <line x1="100" y1="145" x2="300" y2="145"/>
    <line x1="100" y1="145" x2="100" y2="305"/>
    <line x1="300" y1="145" x2="300" y2="305"/>
    <line x1="100" y1="305" x2="300" y2="305"/>
    <!-- Back face -->
    <line x1="420" y1="85" x2="620" y2="85"/>
    <line x1="420" y1="85" x2="420" y2="245"/>
    <line x1="620" y1="85" x2="620" y2="245"/>
    <line x1="420" y1="245" x2="620" y2="245"/>
    <!-- Connecting edges (front to back) -->
    <line x1="100" y1="145" x2="420" y2="85"/>
    <line x1="300" y1="145" x2="620" y2="85"/>
    <line x1="100" y1="305" x2="420" y2="245"/>
    <line x1="300" y1="305" x2="620" y2="245"/>
  </g>

  <!-- Nodes -->
  <g>
    <!-- Front face (pos0 = A) -->
    <circle cx="100" cy="145" r="6" fill="#4a90d9"/>
    <text x="100" y="133" text-anchor="middle" fill="#000" font-size="10">ABCDEFGH</text>
    <text x="100" y="165" text-anchor="middle" fill="#555" font-size="9">(000)</text>

    <circle cx="300" cy="145" r="6" fill="#4a90d9"/>
    <text x="300" y="133" text-anchor="middle" fill="#000" font-size="10">AJCDEFGH</text>
    <text x="300" y="165" text-anchor="middle" fill="#555" font-size="9">(010)</text>

    <circle cx="100" cy="305" r="6" fill="#4a90d9"/>
    <text x="100" y="293" text-anchor="middle" fill="#000" font-size="10">ABKDEFGH</text>
    <text x="100" y="325" text-anchor="middle" fill="#555" font-size="9">(001)</text>

    <circle cx="300" cy="305" r="6" fill="#4a90d9"/>
    <text x="300" y="293" text-anchor="middle" fill="#000" font-size="10">AJKDEFGH</text>
    <text x="300" y="325" text-anchor="middle" fill="#555" font-size="9">(011)</text>

    <!-- Back face (pos0 = I) -->
    <circle cx="420" cy="85" r="6" fill="#e74c3c"/>
    <text x="420" y="73" text-anchor="middle" fill="#000" font-size="10">IBCDEFGH</text>
    <text x="420" y="105" text-anchor="middle" fill="#555" font-size="9">(100)</text>

    <circle cx="620" cy="85" r="6" fill="#e74c3c"/>
    <text x="620" y="73" text-anchor="middle" fill="#000" font-size="10">IJCDEFGH</text>
    <text x="620" y="105" text-anchor="middle" fill="#555" font-size="9">(110)</text>

    <circle cx="420" cy="245" r="6" fill="#e74c3c"/>
    <text x="420" y="233" text-anchor="middle" fill="#000" font-size="10">IBKDEFGH</text>
    <text x="420" y="265" text-anchor="middle" fill="#555" font-size="9">(101)</text>

    <circle cx="620" cy="245" r="6" fill="#e74c3c"/>
    <text x="620" y="233" text-anchor="middle" fill="#000" font-size="10">IJKDEFGH</text>
    <text x="620" y="265" text-anchor="middle" fill="#555" font-size="9">(111)</text>
  </g>

  <!-- Legend -->
  <text x="360" y="353" text-anchor="middle" font-size="9" fill="#666">Blue = pos[0]=A | Red = pos[0]=I | Each edge = differ in exactly 1 position</text>
</svg>
