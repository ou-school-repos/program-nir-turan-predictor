---
name: docs

on:
  push: ["main", "master"]
  pull_request: ["main", "master"]
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-pdfs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            python3-pip \
            texlive-bibtex-extra \
            texlive-fonts-recommended \
            texlive-latex-extra \
            texlive-lang-english \
            texlive-xetex
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt matplotlib networkx pillow

      - name: Build paper figures
        run: |
          mkdir -p docs/out
          python3 scripts/plot_18.py
          python3 scripts/plot_76.py --pdf
          python3 scripts/plot_anomaly.py

      - name: Build paper and markdown PDFs
        run: make docs paper

      - name: Stage PDFs for upload
        run: |
          mkdir -p all-pdfs
          mapfile -t pdfs < <(find . -type f -name '*.pdf' \
            -not -path './.git/*' \
            -not -path './.github/*' \
            -not -path './.lake/*' \
            -not -path './.tmp/*' \
            -not -path './all-pdfs/*' \
            | sort)
          for pdf in "${pdfs[@]}"; do
            rel=${pdf#./}
            mkdir -p "all-pdfs/$(dirname "$rel")"
            cp "$pdf" "all-pdfs/$rel"
          done

      - name: Upload all-pdfs
        uses: actions/upload-artifact@v4
        with:
          name: all-pdfs
          path: all-pdfs
          if-no-files-found: error
